<body>
    <label for="username">Last.fm Username</label>
    <input type="text" data-pref-key="username" id="username"><br>
    <label for="password">Last.fm Password</label>
    <input type="password" data-pref-key="password" id="password">
    <p>Create an API Key at <a href="https://www.last.fm/api/account/create">last.fm/api/account/create</a></p>
    <label for="apiKey">Last.fm API Key</label>
    <input type="text" data-pref-key="apiKey" id="apiKey"><br>
    <label for="apiSecret">Last.fm API Secret</label>
    <input type="text" data-pref-key="apiSecret" id="apiSecret"><br>
</body>
